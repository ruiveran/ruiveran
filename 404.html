<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Ruiveran</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.ruiveran.com/">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230C0C0C'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black%2Csans-serif' font-weight='900' font-size='28' letter-spacing='-1' fill='%23FFFFFF'%3ERV%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:         #F8F5EF;
      --clr-white:      #FFFFFF;
      --clr-orange:     #FF4500;
      --clr-orange-d:   #CC3700;
      --clr-black:      #0C0C0C;
      --clr-zinc:       #18181B;
      --clr-muted:      #7A7A7A;
      --clr-border:     #E5E1D8;
      --frame:          14px;
      --nav-h:          62px;
      --fh:             'Barlow Condensed', sans-serif;
      --fb:             'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--fb);
      background: var(--clr-bg);
      color: var(--clr-black);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* FRAME */
    .g-frame {
      position: fixed;
      inset: 0;
      border: var(--frame) solid var(--clr-white);
      z-index: 9998;
      pointer-events: none;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: var(--frame);
      left: var(--frame);
      right: var(--frame);
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: var(--clr-white);
      border-bottom: 1px solid var(--clr-border);
      z-index: 1000;
    }
    .nav-logo {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--clr-black);
      cursor: pointer;
      text-decoration: none;
    }
    .nav-logo .dot { color: var(--clr-orange); }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 2rem;
    }
    .nav-menu a {
      font-family: var(--fh);
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--clr-muted);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-menu a:hover { color: var(--clr-orange); }

    @media (max-width: 600px) {
      .nav-menu { display: none; }
    }

    /* MAIN */
    main {
      min-height: 100vh;
      padding-top: calc(var(--frame) + var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding-bottom: 120px;
      text-align: center;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .err-num {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(7rem, 20vw, 16rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--clr-black);
      opacity: 0.07;
      user-select: none;
      position: absolute;
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 520px;
    }

    .tag {
      font-family: var(--fh);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.192em;
      color: var(--clr-orange);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: block;
    }

    h1 {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(2.8rem, 6vw, 5rem);
      letter-spacing: -0.02em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1.2rem;
    }

    p {
      font-family: var(--fb);
      font-size: 1rem;
      color: var(--clr-muted);
      line-height: 1.7;
      margin-bottom: 2.4rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--fh);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      background: var(--clr-black);
      color: var(--clr-white);
      border: 1px solid var(--clr-black);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover {
      background: var(--clr-orange);
      border-color: var(--clr-orange);
    }

    .btn-ghost {
      background: transparent;
      color: var(--clr-black);
      margin-left: 0.8rem;
    }
    .btn-ghost:hover {
      background: transparent;
      color: var(--clr-orange);
      border-color: var(--clr-orange);
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: var(--frame);
      left: var(--frame);
      right: var(--frame);
      background: var(--clr-black);
      color: var(--clr-white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      z-index: 100;
    }
    .footer-logo {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.06em;
    }
    .footer-copy {
      font-family: var(--fb);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    /* ANIMATION */
    .content { animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="g-frame"></div>

  <nav class="nav">
    <a class="nav-logo" href="/">RUIVERAN<span class="dot">.</span></a>
    <ul class="nav-menu">
      <li><a href="/">Inicio</a></li>
      <li><a href="/clases">Clases en Vivo</a></li>
      <li><a href="https://ruiveran.gumroad.com/" target="_blank" rel="noopener">Cursos</a></li>
      <li><a href="/contact">Contacto</a></li>
    </ul>
  </nav>

  <main>
    <span class="err-num" aria-hidden="true">404</span>
    <div class="content">
      <span class="tag">Error 404</span>
      <h1>Página no<br>encontrada</h1>
      <p>Esta página no existe o fue movida.<br>Pero todo lo bueno está en el inicio.</p>
      <div>
        <a class="btn" href="/">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 11L2 7M2 7L6 3M2 7H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
          </svg>
          Ir al Inicio
        </a>
        <a class="btn btn-ghost" href="/clases">Ver Clases</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">RUIVERAN<span style="color:var(--clr-orange)">.</span></div>
    <p class="footer-copy">© 2025 Ruiveran. Lima, Perú.</p>
  </footer>
</body>
</html>
