<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUIVERAN — Digital Art Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <script src="https://gumroad.com/js/gumroad.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════
       RESET & ROOT VARIABLES
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:         #F8F5EF;
      --clr-white:      #FFFFFF;
      --clr-orange:     #FF4500;
      --clr-orange-d:   #CC3700;
      --clr-black:      #0C0C0C;
      --clr-zinc:       #18181B;
      --clr-muted:      #7A7A7A;
      --clr-border:     #E5E1D8;
      --frame:          14px;
      --nav-h:          62px;
      --fh:             'Barlow Condensed', sans-serif;
      --fb:             'DM Sans', sans-serif;
      --ease:           cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--fb);
      background: var(--clr-bg);
      color: var(--clr-black);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════
       GLOBAL CANVAS FRAME
    ═══════════════════════════════════════════ */
    .g-frame {
      position: fixed;
      inset: 0;
      border: var(--frame) solid var(--clr-white);
      z-index: 9998;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════ */
    .nav {
      position: fixed;
      top: var(--frame);
      left: var(--frame);
      right: var(--frame);
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: var(--clr-white);
      border-bottom: 1px solid var(--clr-border);
      z-index: 1000;
      transition: box-shadow 0.35s ease;
    }
    .nav.scrolled {
      box-shadow: 0 2px 30px rgba(0,0,0,0.07);
    }

    .nav-logo {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--clr-black);
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .nav-logo .dot { color: var(--clr-orange); }

    .nav-menu {
      display: flex;
      list-style: none;
      flex: 1;
      justify-content: space-evenly;
      padding: 0 1rem;
    }
    .nav-menu button {
      font-family: var(--fh);
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--clr-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      text-transform: uppercase;
      padding: 0;
    }
    .nav-menu button:hover, .nav-menu button.active { color: var(--clr-orange); }
    .nav-menu a {
      font-family: var(--fh) !important;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--clr-muted) !important;
      text-transform: uppercase;
      text-decoration: none !important;
      transition: color 0.2s;
      padding: 0;
      display: inline-block;
    }
    .nav-menu a:hover { color: var(--clr-orange) !important; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }
    .nav-icon-btn {
      background: none;
      border: none;
      color: var(--clr-muted);
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      padding: 4px;
    }
    .nav-icon-btn:hover { color: var(--clr-orange); }

    .nav-lang {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--clr-muted);
      background: none;
      border: 1px solid var(--clr-border);
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-lang:hover { color: var(--clr-orange); border-color: var(--clr-orange); }

    /* ═══════════════════════════════════════════
       LAYOUT SHELL
    ═══════════════════════════════════════════ */
    .main-wrap {
      padding-top: calc(var(--frame) + var(--nav-h));
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       COMMON SECTION STYLES
    ═══════════════════════════════════════════ */
    .section { padding: 110px 4vw; }
    .section-sm { padding: 70px 4vw; }

    .s-tag {
      font-family: var(--fh);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.192em;
      color: var(--clr-orange);
      text-transform: uppercase;
      display: block;
      margin-bottom: 1rem;
    }
    .s-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(2.8rem, 6.5vw, 6.5rem);
      line-height: 0.88;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--clr-black);
    }
    .s-sub {
      font-family: var(--fb);
      font-size: 0.98rem;
      font-weight: 300;
      color: var(--clr-muted);
      margin-top: 1.1rem;
      max-width: 900px;
      line-height: 1.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 900px) { .s-sub { white-space: normal; } }
    .s-header { margin-bottom: 2.38rem; }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.9rem 2.2rem;
      cursor: pointer;
      transition: all 0.22s var(--ease);
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      line-height: 1;
    }
    .btn-orange { background: var(--clr-orange); color: #fff; }
    .btn-orange:hover { background: var(--clr-orange-d); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,69,0,0.28); }
    .btn-outline { background: transparent; color: var(--clr-orange); border: 1.5px solid var(--clr-orange); }
    .btn-outline:hover { background: var(--clr-orange); color: #fff; transform: translateY(-2px); }
    .btn-dark { background: var(--clr-black); color: var(--clr-bg); }
    .btn-dark:hover { opacity: 0.82; transform: translateY(-2px); }
    .btn-ghost { background: transparent; color: var(--clr-muted); border: 1px solid var(--clr-border); }
    .btn-ghost:hover { color: var(--clr-orange); border-color: var(--clr-orange); }

    /* ═══════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════ */
    .line { height: 1px; background: var(--clr-border); width: 100%; }

    /* ═══════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════ */
    .hero {
      min-height: calc(0.8 * (100vh - var(--nav-h) - var(--frame)));
      padding: 0 4vw;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 5.6vh;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .hero-deco {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--fh);
      font-size: clamp(12rem, 32vw, 32rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--clr-border);
      line-height: 1;
      pointer-events: none;
      user-select: none;
      letter-spacing: -0.04em;
      transition: -webkit-text-stroke-color 0.35s;
    }
    html.dark .hero-deco { -webkit-text-stroke-color: rgba(255,255,255,0.04); }

    .hero-label {
      font-family: var(--fh);
      font-size: 0.864rem;
      font-weight: 600;
      letter-spacing: 0.192em;
      color: var(--clr-orange);
      margin-top: 0;
      margin-bottom: 0.05rem;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .hero-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(5.5rem, 20vw, 20rem);
      line-height: 0.83;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: #fff;
      position: relative;
      z-index: 1;
    }
    .hero-title .outline {
      -webkit-text-stroke: 2.5px rgba(255,255,255,0.85);
      color: transparent;
      transition: -webkit-text-stroke-color 0.35s;
    }
    html.dark .hero-title .outline { -webkit-text-stroke-color: var(--clr-black); }

    .hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: 2.5rem;
      position: relative;
      z-index: 1;
      gap: 2rem;
    }
    .hero-sub {
      font-family: var(--fb);
      font-size: clamp(0.88rem, 1.1vw, 1.05rem);
      font-weight: 300;
      color: rgba(255,255,255,0.72);
      max-width: 300px;
      line-height: 1.7;
      white-space: pre-line;
    }
    .hero-ctas { display: flex; gap: 0.85rem; flex-wrap: wrap; align-items: center; }
    .hero-stat-row {
      display: flex;
      gap: 2.5rem;
      margin-top: 1rem;
    }
    .hero-stat-val {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.5rem;
      color: #fff;
      line-height: 1;
    }
    .hero-stat-lbl {
      font-family: var(--fb);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.58);
      margin-top: 0.15rem;
    }

    .hero-collab-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1.1rem;
      margin-bottom: 0.85rem;
    }
    .hero-collab-lbl {
      font-family: var(--fb);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      margin-right: 0.2rem;
    }
    .hero-collab-badge {
      font-family: var(--fh);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.28);
      padding: 3px 10px;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .hero-collab-badge:hover { border-color: var(--clr-orange); color: var(--clr-orange); }

    .hero-collab-logo {
      display: inline-flex;
      align-items: center;
      color: var(--clr-black);
      opacity: 0.55;
      transition: opacity 0.2s;
      padding: 2px 0;
    }
    .hero-collab-logo:hover { opacity: 1; }

    /* ═══════════════════════════════════════════
       HERO MANUAL CAROUSEL
    ═══════════════════════════════════════════ */
    @keyframes hc-fadein  { from { opacity: 0;    } to { opacity: 0.42; } }
    @keyframes hc-fadeout { from { opacity: 0.42; } to { opacity: 0;    } }

    .hc-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .hc-slide {
      position: absolute;
      inset: 0;
    }
    .hc-slide-out {
      z-index: 1;
      animation: hc-fadeout 0.85s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .hc-slide-in {
      z-index: 2;
      animation: hc-fadein 0.85s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    .hc-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.18) 70%, rgba(0,0,0,0.08) 100%);
      z-index: 3;
      pointer-events: none;
    }

    .hc-arrow {
      position: absolute;
      top: 32%;
      transform: translateY(-50%);
      z-index: 4;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, background 0.2s, transform 0.2s;
    }
    .hc-arrow-l { left: 1.2rem; transform: translateY(-50%); }
    .hc-arrow-r { right: 1.2rem; transform: translateY(-50%); }
    .hc-arrow.hc-arrow-vis { opacity: 1; }
    .hc-arrow:hover { background: var(--clr-orange); border-color: var(--clr-orange); }

    .hc-dots {
      position: absolute;
      bottom: 1.5rem;
      right: 4vw;
      z-index: 4;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .hc-dots.hc-dots-vis { opacity: 1; }
    .hc-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      padding: 0;
    }
    .hc-dot.active { background: var(--clr-orange); transform: scale(1.4); }

    .hero-social-row {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-bottom: 1.1rem;
    }
    .hero-social-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--clr-border);
      color: var(--clr-muted);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .hero-social-pill:hover { color: var(--clr-orange); border-color: var(--clr-orange); }

    /* ═══════════════════════════════════════════
       MARQUEE
    ═══════════════════════════════════════════ */
    .marquee-wrap {
      overflow: hidden;
      border-top: 1px solid var(--clr-border);
      border-bottom: 1px solid var(--clr-border);
      padding: 0.8rem 0;
      background: var(--clr-white);
      transition: background 0.35s;
    }
    .marquee-track {
      display: flex;
      animation: marqueeRun 22s linear infinite;
      white-space: nowrap;
    }
    .marquee-item {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--clr-muted);
      text-transform: uppercase;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .marquee-dot {
      width: 5px;
      height: 5px;
      background: var(--clr-orange);
      border-radius: 50%;
      flex-shrink: 0;
    }
    @keyframes marqueeRun {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ═══════════════════════════════════════════
       GALLERY
    ═══════════════════════════════════════════ */
    .gallery-grid {
      columns: 3;
      column-gap: 14px;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
    }
    .gallery-thumb {
      width: 100%;
      display: block;
      transition: transform 0.5s var(--ease);
      height: auto;
    }
    .gallery-item:hover .gallery-thumb { transform: scale(1.04); }
    .gallery-over {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.32s var(--ease);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }
    .gallery-item:hover .gallery-over { background: rgba(0,0,0,0.52); }
    .gallery-over-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
    }
    .gallery-item:hover .gallery-over-content { opacity: 1; transform: translateY(0); }
    .gallery-over-title {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }
    .gallery-over-cart {
      background: var(--clr-orange);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .gallery-over-cart:hover { background: var(--clr-orange-d); transform: scale(1.1); }

    /* ═══════════════════════════════════════════
       COURSE STEP NAV
    ═══════════════════════════════════════════ */
    .course-step-nav {
      display: flex;
      border-bottom: 1px solid var(--clr-border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .course-step-nav::-webkit-scrollbar { display: none; }
    .course-step-item {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      padding: 0.85rem 1.2rem;
      border-right: 1px solid var(--clr-border);
      cursor: pointer;
      background: var(--clr-white);
      transition: background 0.18s;
      position: relative;
    }
    .course-step-item:last-child { border-right: none; }
    .course-step-item:hover { background: rgba(255,69,0,0.04); }
    .course-step-item.active { background: var(--clr-black); }
    .course-step-item.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--clr-orange);
    }
    .course-step-num {
      font-family: var(--fh);
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clr-orange);
    }
    .course-step-title {
      font-family: var(--fh);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--clr-black);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .course-step-item.active .course-step-title { color: #fff; }
    .course-step-item.active .course-step-num { color: var(--clr-orange); }
    .course-step-bar {
      height: 2px;
      background: var(--clr-border);
      width: 100%;
      margin-top: 0.35rem;
      position: relative;
      overflow: hidden;
    }
    .course-step-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--clr-orange);
    }
    @media (max-width: 600px) {
      .course-step-title { font-size: 0.62rem; }
      .course-step-item { padding: 0.7rem 0.8rem; }
    }

    /* Pinterest scroll-reveal per item */
    .pin-item { opacity: 0; transform: translateY(28px); transition: opacity 0.6s var(--ease), transform 0.6s var(--ease); }
    .pin-item.pin-in { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════════════════
       COURSES GRID
    ═══════════════════════════════════════════ */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 2px;
    }

    .course-card {
      background: var(--clr-white);
      border: 1px solid var(--clr-border);
      overflow: hidden;
      transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease);
      cursor: pointer;
    }
    .course-card.live:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(0,0,0,0.1); }

    .course-thumb { width: 100%; aspect-ratio: 1/1; }

    .course-body { padding: 1.5rem 1.5rem 1.5rem; }

    .course-num {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 2.2rem;
      color: var(--clr-border);
      line-height: 1;
      float: right;
      margin-left: 0.5rem;
      letter-spacing: -0.03em;
    }
    .course-level {
      font-family: var(--fh);
      font-size: 0.975rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--clr-orange);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .course-name {
      font-family: var(--fh);
      font-weight: 800;
      font-size: 1.3rem;
      line-height: 1.05;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--clr-black);
      margin-bottom: 0.7rem;
      clear: both;
    }
    .course-desc {
      font-family: var(--fb);
      font-size: 0.83rem;
      color: var(--clr-muted);
      line-height: 1.65;
      margin-bottom: 1.1rem;
    }
    .course-meta {
      display: flex;
      gap: 1rem;
      font-family: var(--fh);

    .dp-val { font-family: var(--fh); font-weight: 900; font-size: 2.8rem; color: var(--clr-black); line-height: 1; }
    .dp-period { font-family: var(--fb); font-size: 0.72rem; color: var(--clr-muted); margin-top: 2px; }
    .dp-sep { width: 1px; background: var(--clr-border); }
    .feat-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 0.55rem 0 0.75rem; }

    .detail-btn-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .detail-payments { font-family: var(--fb); font-size: 0.72rem; color: var(--clr-muted); letter-spacing: 0.04em; }

    /* ═══════════════════════════════════════════
       5-STAR REVIEWS
    ═══════════════════════════════════════════ */
    .reviews-summary {
      display: flex; align-items: center; gap: 2rem; padding: 2rem 4vw;

    }
    .reviews-big-num { font-family: var(--fh); font-weight: 900; font-size: 4.5rem; color: var(--clr-black); line-height: 1; }
    .reviews-stars-row { color: var(--clr-orange); font-size: 1.3rem; letter-spacing: 3px; margin-bottom: 4px; }
    .reviews-count { font-family: var(--fb); font-size: 0.78rem; color: var(--clr-muted); }

    /* ═══════════════════════════════════════════

    /* ═══════════════════════════════════════════
       STUDENT WORKS MASONRY
    ═══════════════════════════════════════════ */
    .sw-masonry { columns: 4; column-gap: 10px; }
    .sw-item { break-inside: avoid; margin-bottom: 10px; overflow: hidden; cursor: pointer; position: relative; }

    /* ═══════════════════════════════════════════
       LIVE CLASSES
    ═══════════════════════════════════════════ */

    .tier-card { padding: 3.36rem; border: 1px solid var(--clr-border); background: var(--clr-white); box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04); transition: box-shadow 0.3s var(--ease), transform 0.3s var(--ease); }

    .tier-tag { font-family: var(--fh); font-size: 1.2rem; font-weight: 800; letter-spacing: 0.112em; color: var(--clr-orange); text-transform: uppercase; margin-bottom: 0.6rem; }

    .tier-price { font-family: var(--fh); font-weight: 900; font-size: 3.6rem; color: var(--clr-orange); line-height: 1; margin-top: 1rem; }
    .tier-period { font-family: var(--fb); font-size: 0.78rem; color: #B8B2A8; margin-top: 0.2rem; margin-bottom: 2rem; }
    .tier-card.featured .tier-period { color: #B8B2A8; }

    .feat-list { list-style: none; display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2.5rem; }
    .feat-item { display: flex; align-items: flex-start; gap: 0.7rem; font-family: var(--fb); font-size: 0.88rem; line-height: 1.5; }
    .tier-card:not(.featured) .feat-item { color: var(--clr-black); }
    .tier-card.featured .feat-item { color: #D4CFC7; }
    .fi-dot {
      flex-shrink: 0;
      width: 18px; height: 18px;
      background: var(--clr-orange);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }

    .guarantee-box {
      border: 1px solid var(--clr-border);
      background: var(--clr-white);

      margin-top: 2.5rem;

      gap: 1.5rem;
    }
    .guarantee-icon { font-size: 2.2rem; flex-shrink: 0; }
    .guarantee-title { font-family: var(--fh); font-weight: 800; font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--clr-black); margin-bottom: 0.2rem; }
    .guarantee-sub { font-family: var(--fb); font-size: 0.8rem; color: var(--clr-muted); line-height: 1.6; }

    .faq-big-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--clr-black);
      line-height: 0.9;
      margin-bottom: 0.5rem;
    }
      text-align: center;
      margin-top: 3rem;
      padding: 3rem;
      border: 1px dashed var(--clr-border);
    }
    .live-waitlist-title { font-family: var(--fh); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; color: var(--clr-muted); text-transform: uppercase; margin-bottom: 1.2rem; }

    /* ─── FAQ ─── */
    .faq-list { display: flex; flex-direction: column; margin-top: 1.5rem; border-top: 1px solid var(--clr-border); }
    .faq-item { border-bottom: 1px solid var(--clr-border); }
    .faq-q {
      width: 100%;
      display: flex;

      padding: 1.2rem 0;

    }

    .faq-q-text {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 1.05rem;

    /* ─── Live gallery strip (inside banner) ─── */
    .live-gallery-strip {

    }
    .live-gallery-thumb {
      flex: 1;

    .curriculum-strip {

    }

    .insc-level-tag {
      font-family: var(--fh);
      font-weight: 800;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--clr-orange);
      text-transform: uppercase;
      margin-right: 0.6rem;
    }
    .insc-level-desc {
      font-family: var(--fb);
      font-size: 0.82rem;
      color: var(--clr-muted);
    }
    .insc-level-price {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.1rem;

    /* Price callout inside FAQ */

      padding-left: 1.2rem;
    }
    .faq-price-callout-inner { display: flex; flex-direction: column; gap: 0.3rem; }
    .faq-price-label { font-family: var(--fh); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.22em; color: var(--clr-muted); text-transform: uppercase; }
    .faq-price-big {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(1.6rem, 3.5vw, 3rem);
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--clr-black);
      line-height: 1;
    }
    .faq-price-sub { font-family: var(--fb); font-size: 0.82rem; color: var(--clr-muted); line-height: 1.65; margin-top: 0.4rem; max-width: 480px; }

      padding: 2.5rem;

      font-family: var(--fh);
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--clr-black);
      line-height: 1;

      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--clr-muted);
      text-decoration: none;
      border: 1px solid var(--clr-border);
      padding: 0.5rem 1rem;
      transition: color 0.2s, border-color 0.2s;
      text-transform: uppercase;
    }
    .social-pill:hover { color: var(--clr-orange); border-color: var(--clr-orange); }

    .form-wrap {}
    .fgroup { margin-bottom: 1.2rem; }
    .contact-email-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--clr-border);
      padding: 0.75rem 1rem;
      margin-bottom: 1.2rem;
      background: transparent;
      transition: border-color 0.2s;
    }
    .contact-email-item:hover { border-color: var(--clr-orange); }
    .contact-email-val {
      font-family: var(--fb);
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--clr-black);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .contact-email-val:hover { color: var(--clr-orange); }

    .contact-email-above {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      margin-bottom: 1.4rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--clr-border);
    }
    .contact-email-label {
      font-family: var(--fh);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--clr-muted);
      text-transform: uppercase;
    }
    .contact-email-addr {
      font-family: var(--fb);
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--clr-black);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-email-addr:hover { color: var(--clr-orange); }
    .flabel {
      font-family: var(--fh);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--clr-muted);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.45rem;
    }
    .finput, .ftextarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--clr-border);
      color: var(--clr-black);
      font-family: var(--fb);
      font-size: 0.92rem;
      font-weight: 300;
      padding: 0.82rem 1rem;
      transition: border-color 0.2s;
      outline: none;
      resize: none;
    }
    .finput:focus, .ftextarea:focus { border-color: var(--clr-orange); }
    .ftextarea { min-height: 145px; }

    .form-success {
      border: 1px solid var(--clr-orange);
      padding: 3rem 2rem;
      text-align: center;
    }
    .form-success-check { font-size: 2.5rem; color: var(--clr-orange); margin-bottom: 1rem; display: block; }
    .form-success-title { font-family: var(--fh); font-weight: 800; font-size: 1.6rem; text-transform: uppercase; color: var(--clr-black); margin-bottom: 0.5rem; }
    .form-success-sub { font-family: var(--fb); font-size: 0.85rem; color: var(--clr-muted); }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    .footer {
      padding: 2.5rem 4vw;
      border-top: 1px solid var(--clr-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--clr-white);
      transition: background 0.35s;
    }
    .footer-logo { font-family: var(--fh); font-weight: 900; font-size: 1.2rem; color: var(--clr-black); }
    .footer-copy { font-family: var(--fb); font-size: 0.72rem; color: var(--clr-muted); margin-top: 0.2rem; }
    .footer-links { display: flex; gap: 2rem; }
    .footer-link {
      font-family: var(--fh);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--clr-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 0;
    }
    .footer-link:hover { color: var(--clr-orange); }

    /* ═══════════════════════════════════════════
       SCROLL REVEAL ANIMATIONS
    ═══════════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(35px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { opacity: 0; transform: translateY(35px); transition: opacity 0.75s var(--ease), transform 0.75s var(--ease); }
    .anim.in { opacity: 1; transform: translateY(0); }
    .anim.d1 { transition-delay: 0.1s; }
    .anim.d2 { transition-delay: 0.22s; }
    .anim.d3 { transition-delay: 0.36s; }
    .anim.d4 { transition-delay: 0.5s; }

    /* Hero immediate animation */
    .hero-anim-1 { animation: fadeUp 0.9s var(--ease) 0.1s both; }
    .hero-anim-2 { animation: fadeUp 0.9s var(--ease) 0.25s both; }
    .hero-anim-3 { animation: fadeUp 0.9s var(--ease) 0.45s both; }

    /* ═══════════════════════════════════════════
       UPSELL DARK SECTION
    ═══════════════════════════════════════════ */
    .upsell-dark {
      background: var(--clr-black);
    }
    .upsell-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(3.5rem, 8.75vw, 8.75rem);
      text-transform: uppercase;
      letter-spacing: -0.025em;
      line-height: 0.9;
      color: #fff;
      margin-bottom: 1rem;
    }
    .upsell-sub { font-family: var(--fb); font-size: 0.95rem; color: #D4CFC7; max-width: none; line-height: 1.7; margin-bottom: 2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upsell-sub-mobile { display: none !important; }
    @media (max-width: 900px) {
      .upsell-sub:not(.upsell-sub-mobile) { display: none !important; }
      .upsell-sub-mobile { display: block !important; white-space: normal !important; }
    }

    /* ═══════════════════════════════════════════
       BUNDLE BANNER (horizontal, before courses)
    ═══════════════════════════════════════════ */
    .bundle-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      background: var(--clr-black);
      padding: 1.8rem 4vw;
      margin: 0 0 2.5rem;
      flex-wrap: wrap;
      cursor: pointer;
    }
    .bundle-banner:hover { filter: brightness(1.12); }
    .bundle-banner-left { display: flex; align-items: center; gap: 1.4rem; flex-wrap: wrap; }
    .bundle-banner-tag {
      font-family: var(--fh);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--clr-orange);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .bundle-banner-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .bundle-banner-desc {
      font-family: var(--fb);
      font-size: 0.78rem;
      color: #C8C2B8;
      margin-top: 0.25rem;
    }
    .bundle-banner-price {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--clr-orange);
      line-height: 1;
      white-space: nowrap;
    }
    .bundle-banner-sub {
      font-family: var(--fb);
      font-size: 0.65rem;
      color: #B8B2A8;
      margin-top: 1px;
    }
    .bundle-sep { width: 1px; height: 40px; background: #333; flex-shrink: 0; }

    /* ═══════════════════════════════════════════
       DASHBOARD
    ═══════════════════════════════════════════ */
    .db-wrap { display: flex; min-height: calc(100vh - 60px); background: var(--clr-bg); }
    .db-sidebar {
      width: 260px; flex-shrink: 0;
      border-right: 1px solid var(--clr-border);
      background: var(--clr-bg);
      padding: 2rem 0;
      display: flex; flex-direction: column; gap: 0;
      position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto;
    }
    .db-sidebar-title { font-family: var(--fh); font-weight: 800; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--clr-muted); padding: 0 1.4rem 0.8rem; margin: 0; }
    .db-course-btn { display: flex; align-items: flex-start; gap: 0.8rem; padding: 0.75rem 1.4rem; cursor: pointer; background: none; border: none; width: 100%; text-align: left; transition: background 0.15s; border-right: 2px solid transparent; }
    .db-course-btn:hover { background: rgba(0,0,0,0.04); }
    .db-course-btn.active { background: rgba(255,69,0,0.07); border-right-color: var(--clr-orange); }
    .db-course-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .db-course-label { font-family: var(--fh); font-weight: 800; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--clr-text); line-height: 1.2; }
    .db-course-sub { font-family: var(--fb); font-size: 0.7rem; color: var(--clr-muted); margin-top: 2px; }
    .db-main { flex: 1; padding: 2.4rem 3vw 4rem; overflow-y: auto; min-width: 0; background: #ffffff; }
    .db-breadcrumb { font-family: var(--fh); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--clr-muted); margin-bottom: 1.6rem; display: flex; align-items: center; gap: 0.5rem; }
    .db-breadcrumb span { color: var(--clr-orange); }
    .db-course-title { font-family: var(--fh); font-weight: 900; font-size: clamp(1.6rem,3.5vw,2.8rem); letter-spacing: -0.02em; text-transform: uppercase; color: var(--clr-black); line-height: 1; margin-bottom: 0.4rem; }
    .db-course-meta { font-family: var(--fb); font-size: 0.82rem; color: var(--clr-muted); margin-bottom: 2rem; }
    .db-lessons-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--clr-border); margin-bottom: 3rem; }
    .db-lesson-row { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.2rem; cursor: pointer; border-bottom: 1px solid var(--clr-border); transition: background 0.15s; }
    .db-lesson-row:last-child { border-bottom: none; }
    .db-lesson-row:hover { background: rgba(0,0,0,0.03); }
    .db-lesson-row.active { background: rgba(255,69,0,0.06); border-left: 2px solid var(--clr-orange); }
    .db-lesson-num { font-family: var(--fh); font-weight: 800; font-size: 0.68rem; letter-spacing: 0.12em; color: var(--clr-muted); width: 28px; flex-shrink: 0; }
    .db-lesson-name { font-family: var(--fh); font-weight: 700; font-size: 0.88rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--clr-text); flex: 1; }
    .db-lesson-count { font-family: var(--fb); font-size: 0.72rem; color: var(--clr-muted); }
    .db-section-label { font-family: var(--fh); font-weight: 800; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--clr-muted); margin-bottom: 1rem; }
    .db-videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1px; background: var(--clr-border); margin-bottom: 3rem; }
    .db-video-card { background: var(--clr-bg); cursor: pointer; transition: opacity 0.18s; }
    .db-video-card:hover .db-video-play { transform: scale(1.1); }
    .db-video-thumb { width: 100%; aspect-ratio: 16/9; position: relative; display: flex; align-items: center; justify-content: center; }
    .db-video-play { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; transition: transform 0.18s; }
    .db-video-info { padding: 0.6rem 0.7rem; }
    .db-video-num { font-family: var(--fh); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; color: var(--clr-muted); }
    .db-video-title { font-family: var(--fh); font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--clr-text); line-height: 1.3; }
    .db-player-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    .db-player-box { width: min(820px, 92vw); position: relative; }
    .db-player-screen { width: 100%; aspect-ratio: 16/9; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .db-player-controls { background: #111; padding: 0.9rem 1.2rem; display: flex; align-items: center; gap: 1rem; }
    .db-player-play-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--clr-orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .db-player-bar-wrap { flex: 1; height: 3px; background: #333; cursor: pointer; position: relative; border-radius: 2px; }
    .db-player-bar-fill { height: 100%; background: var(--clr-orange); width: 28%; border-radius: 2px; }
    .db-player-time { font-family: var(--fb); font-size: 0.72rem; color: #888; white-space: nowrap; }
    .db-player-title { font-family: var(--fh); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; }
    .db-player-close { position: absolute; top: -2.4rem; right: 0; background: none; border: none; color: #fff; cursor: pointer; font-size: 1rem; opacity: 0.7; font-family: var(--fh); font-weight: 700; letter-spacing: 0.1em; }
    .db-player-close:hover { opacity: 1; }
    @media (max-width: 700px) { .db-sidebar { display: none; } .db-videos-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ═══════════════════════════════════════════
       LIVE CLASS COURSE PREVIEW BANNER
    ═══════════════════════════════════════════ */
    .live-course-banner {
      border: 1px solid var(--clr-orange);
      padding: 1.5rem 1.8rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 3rem;
      background: rgba(255,69,0,0.03);
      overflow: hidden;
    }
    .live-course-banner {
      border: 1px solid var(--clr-orange);
      padding: 1.4rem 1.8rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 3rem;
      background: rgba(255,69,0,0.03);
      overflow: hidden;
    }
    .lcb-top {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 1.1rem;
    }
    .lcb-left { display: flex; flex-direction: column; gap: 0.55rem; }
    .lcb-eyebrow {
      font-family: var(--fh);
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.112em;
      color: var(--clr-orange);
      text-transform: uppercase;
    }
    .lcb-title {
      font-family: var(--fh);
      font-weight: 900;
      font-size: clamp(2rem, 5.5vw, 5rem);
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--clr-black);
      line-height: 0.92;
    }
    .lcb-subtitle {
      font-family: var(--fh);
      font-weight: 800;
      font-size: 1.08rem;
      letter-spacing: 0.112em;
      text-transform: uppercase;
      color: var(--clr-orange);
    }
    .lcb-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.55rem;
    }
    .lcb-date {
      font-family: var(--fh);
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.112em;
      color: var(--clr-black);
      text-transform: uppercase;
    }
    .lcb-dot {
      width: 8px; height: 8px;
      background: var(--clr-orange);
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.8s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ═══════════════════════════════════════════
       PRINT STORE
    ═══════════════════════════════════════════ */
    .prints-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }
    .print-card {
      background: var(--clr-white);
      border: 1px solid var(--clr-border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease);
    }
    .print-card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(0,0,0,0.09); }
    .print-img { width: 100%; aspect-ratio: 1/1; display: block; transition: transform 0.5s var(--ease); }
    .print-card:hover .print-img { transform: scale(1.03); }
    .print-body { padding: 1.2rem 1.4rem 1.4rem; }
    .print-edition {
      font-family: var(--fh);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.176em;
      color: var(--clr-muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .print-name {
      font-family: var(--fh);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--clr-black);
      margin-bottom: 0.8rem;
    }
    .print-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .print-price {
      font-family: var(--fh);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--clr-black);
    }
    .print-size {
      font-family: var(--fb);
      font-size: 0.7rem;
      color: var(--clr-muted);
    }

    /* ═══════════════════════════════════════════
       PRODUCT ISLAND MODAL
    ═══════════════════════════════════════════ */
    .island-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--frame) 1rem;
      animation: fadeIn 0.22s var(--ease);
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    .island-box {
      background: var(--clr-bg);
      width: 100%;
      max-width: 440px;
      position: relative;
      animation: slideUp 0.32s var(--ease);
      box-shadow: 0 32px 80px rgba(0,0,0,0.38);
      display: flex;
      flex-direction: column;
    }
    @keyframes slideUp { from { transform:translateY(60px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    .island-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      font-size: 1rem; cursor: pointer;
      color: var(--clr-muted);
      z-index: 1;
    }
    .island-img { width: 100%; aspect-ratio: 1/1; display: block; flex-shrink: 0; }
    .island-body { padding: 1.2rem 1.5rem 1.6rem; flex: 1; }
    .island-edition { font-family: var(--fh); font-size: 0.58rem; font-weight: 700; letter-spacing: 0.176em; color: var(--clr-orange); text-transform: uppercase; margin-bottom: 0.2rem; }
    .island-title { font-family: var(--fh); font-weight: 900; font-size: 2rem; text-transform: uppercase; letter-spacing: -0.02em; color: var(--clr-black); line-height: 1; margin-bottom: 0.4rem; }
    .island-meta { font-family: var(--fb); font-size: 0.78rem; color: var(--clr-muted); margin-bottom: 1rem; }
    .island-price { font-family: var(--fh); font-weight: 900; font-size: 2.6rem; color: var(--clr-black); letter-spacing: -0.03em; margin-bottom: 1.2rem; line-height: 1; }
    .island-payments { font-family: var(--fb); font-size: 0.72rem; color: var(--clr-muted); text-align: center; margin-top: 0.5rem; }
    .island-ship { font-family: var(--fb); font-size: 0.75rem; color: var(--clr-muted); text-align: center; margin-top: 0.3rem; }

    /* ═══════════════════════════════════════════
       LOGIN PAGE
    ═══════════════════════════════════════════ */
    .login-wrap {
      min-height: calc(100vh - var(--nav-h) - var(--frame) * 2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vw;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--clr-border);
      padding: 3rem 2.5rem 2.5rem;
      background: var(--clr-white);
    }
    .login-logo { font-family: var(--fh); font-weight: 900; font-size: 1.5rem; color: var(--clr-black); letter-spacing: 0.06em; margin-bottom: 2.5rem; text-align: center; }
    .login-logo span { color: var(--clr-orange); }
    .login-title { font-family: var(--fh); font-weight: 900; font-size: 2.2rem; text-transform: uppercase; letter-spacing: -0.02em; color: var(--clr-black); margin-bottom: 0.3rem; line-height: 1; }
    .login-sub { font-family: var(--fb); font-size: 0.82rem; color: var(--clr-muted); margin-bottom: 2rem; }
    .login-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .login-divider-line { flex: 1; height: 1px; background: var(--clr-border); }
    .login-divider-text { font-family: var(--fh); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; color: var(--clr-muted); text-transform: uppercase; }
    .login-footer-text { font-family: var(--fb); font-size: 0.78rem; color: var(--clr-muted); text-align: center; margin-top: 1.5rem; }
    .login-footer-text button { background: none; border: none; cursor: pointer; color: var(--clr-orange); font-family: var(--fb); font-size: 0.78rem; padding: 0; }

/* 12-image hover-scroll carousel for live banner — 3 squares visible, hover sides to scroll */
function LiveHoverCarousel({ images, onNavigate }) {
  // Duplicate images to create seamless loop
  const doubled = [...images, ...images];
  const itemW = 33.333; // 3 visible = 100% / 3 each
  const totalW = doubled.length * itemW; // percent width of inner strip
  // Speed: full 12-image loop in ~60s → very slow
  const duration = images.length * 15; // 15s per image = 180s for 12 (300% slower)

  return (
    <div style={{ position:'relative', width:'100%', overflow:'hidden', cursor:'pointer' }}
      onClick={onNavigate}>
      <style>{`
        @keyframes liveScroll {
          from { transform: translateX(0); }
          to   { transform: translateX(-50%); }
        }
        .live-scroll-inner {
          display: flex;
          width: ${totalW}%;
          animation: liveScroll ${duration}s linear infinite;
        }
        .live-scroll-inner:hover { animation-play-state: paused; }
      `}</style>
      <div className="live-scroll-inner">
        {doubled.map((img, i) => (
          <div key={i} style={{
            flex: `0 0 ${100 / doubled.length}%`,
            aspectRatio: '1/1',
            background: img.g,
          }} />
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   HOOK: SCROLL REVEAL
══════════════════════════════════════════ */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const els = ref.current.querySelectorAll('.anim');
    const obs = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
      { threshold: 0.1 }
    );
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return ref;
}

/* ══════════════════════════════════════════
   MANUAL HERO CAROUSEL
══════════════════════════════════════════ */
function HeroCarousel() {
  const [idx, setIdx] = useState(0);
  const [prev, setPrev] = useState(null);
  const [hovered, setHovered] = useState(false);
  const items = GALLERY;

  const go = (next) => {
    if (next === idx) return;
    setPrev(idx);
    setIdx(next);
    setTimeout(() => setPrev(null), 900);
  };
  const goNext = () => go((idx + 1) % items.length);
  const goPrev = () => go((idx - 1 + items.length) % items.length);

  return (
    <div
      className="hc-wrap"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      {prev !== null && (
        <div key={`out-${prev}`} className="hc-slide hc-slide-out" style={{ background: items[prev].g }} />
      )}
      <div key={`in-${idx}`} className="hc-slide hc-slide-in" style={{ background: items[idx].g }} />

      <button className={`hc-arrow hc-arrow-l${hovered ? ' hc-arrow-vis' : ''}`} onClick={goPrev} aria-label="prev">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button className={`hc-arrow hc-arrow-r${hovered ? ' hc-arrow-vis' : ''}`} onClick={goNext} aria-label="next">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <div className={`hc-dots${hovered ? ' hc-dots-vis' : ''}`}>
        {items.map((_, i) => (
          <button key={i} className={`hc-dot${i === idx ? ' active' : ''}`} onClick={() => go(i)} />
        ))}
      </div>

      <div className="hc-fade" />
    </div>
  );
}

function Lightbox({ item, onClose }) {
  useEffect(() => {
    const fn = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, []);
  return (
    <div className="lightbox-backdrop" onClick={onClose}>
      <div className="lightbox-inner" onClick={e => e.stopPropagation()}>
        <button className="lightbox-close" onClick={onClose}>✕</button>
        <div className="lightbox-img" style={{ background: item.g }} />
        <div className="lightbox-caption">{item.title}</div>
      </div>
    </div>
  );
}

function Footer({ lang, goTo }) {
  const t = (es, en) => lang === 'es' ? es : en;

    { key:'home',     es:'PORTFOLIO',     en:'PORTFOLIO'     },
    { key:'cursos',   es:'CURSOS',        en:'COURSES'       },
    { key:'vivo',     es:'CLASES EN VIVO',en:'LIVE CLASSES'  },
    { key:'prints',   es:'ART PRINTS',    en:'ART PRINTS'    },
    { key:'contacto', es:'CONTACTO',      en:'CONTACT'       },
  ];
  return (
    <footer className="footer">
      <div>
        <div className="footer-logo">RUIVERAN<span style={{ color:'var(--clr-orange)' }}>.</span></div>
        <p className="footer-copy">
          © 2025 Ruiveran. Lima, Perú. {t('Todos los derechos reservados.','All rights reserved.')}
        </p>
      </div>
      <div className="footer-links">
        {links.map(l => (
          <button key={l.key} className="footer-link" onClick={() => goTo(l.key)}>
            {t(l.es, l.en)}
          </button>
        ))}
      </div>
    </footer>
  );
}

const INITIAL_PAGE = 'home';

function App() {
  const [lang, setLang] = useState('es');

  // Determine current page from INITIAL_PAGE set per-file
  const currentPage = typeof INITIAL_PAGE !== 'undefined' ? INITIAL_PAGE : 'home';

  const goTo = useCallback((p) => {
    const map = { home: '/', cursos: 'https://ruiveran.gumroad.com/', vivo: '/clases', prints: 'https://www.inprnt.com/', contacto: '/contact' };
    const url = map[p] || '/';
    if (url.startsWith('http')) { window.location.href = url; }
    else { window.location.href = url; }
  }, []);

  return (
    <>
      <div className="g-frame" />
      <Nav lang={lang} setLang={setLang} page={currentPage} goTo={goTo} />
      <div className="main-wrap">
        {currentPage === 'home'     && <HomePage   lang={lang} goTo={goTo} />}
        {currentPage === 'vivo'     && <LivePage   lang={lang} goTo={goTo} />}
        {currentPage === 'contacto' && <ContactPage lang={lang} />}
        <div className="line" /><Footer lang={lang} goTo={goTo} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
